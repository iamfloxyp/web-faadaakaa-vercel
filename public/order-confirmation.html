<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Confirmation</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.js"></script>
</head>

<body class="bg-[#F9FAFB]">


  
<div class="max-w-[900px] mx-auto mt-[40px] bg-white p-[24px] rounded-[12px] border">
  
  <h1 class="text-[24px] font-semibold mb-[20px] text-[#101828]">
    Order Successfully Placed 🎉
  </h1>

  <div id="orderDetails" class="text-[15px] text-[#344054] leading-[22px]">

    <!-- Filled by JS -->

  </div>

  <a href="index.html">
    <button class="mt-[24px] px-[20px] py-[12px] bg-[#1570EF] text-white rounded-md">
      Continue Shopping
    </button>
  </a>

</div>

<script>
  // Load latest order
  const orders = JSON.parse(localStorage.getItem("orders")) || [];
  const order = orders[orders.length - 1];

  if (order) {
    document.getElementById("orderDetails").innerHTML = `
      <p><strong>Order Number:</strong> ${order.orderNumber}</p>
      <p><strong>Date:</strong> ${order.date}</p>
      <hr class="my-[12px]">

      <h2 class="text-[18px] font-semibold mb-[10px]">Item Purchased</h2>
      <p><strong>Product:</strong> ${order.item.name}</p>
      <p><strong>Quantity:</strong> ${order.item.qty}</p>
      <p><strong>Unit Price:</strong> ₦${order.item.unitPrice.toLocaleString()}</p>
      <p><strong>Total Paid:</strong> ₦${order.item.total.toLocaleString()}</p>

      <hr class="my-[12px]">

      <p><strong>Payment Method:</strong> ${order.paymentMethod}</p>
      <p><strong>Wallet Deducted:</strong> ₦${order.walletUsed.toLocaleString()}</p>

      <hr class="my-[12px]">

      <p><strong>Delivery:</strong> ${order.delivery}</p>
    `;
  }
</script>

</body>
</html>
